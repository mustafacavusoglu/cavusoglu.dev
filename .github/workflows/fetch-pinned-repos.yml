name: Fetch Pinned Repos

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  fetch-pinned:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch pinned repos and update projects.json
        run: |
          python3 -c "
          import json, requests
          from bs4 import BeautifulSoup

          USERNAME = 'mustafacavusoglu'
          BASE_URL = 'https://github.com'
          API_URL = 'https://api.github.com'
          HEADERS = {'User-Agent': 'GitHub-Action'}

          def get_pinned_repo_names():
              resp = requests.get(f'{BASE_URL}/{USERNAME}', headers=HEADERS, timeout=15)
              if resp.status_code != 200:
                  raise Exception(f'GitHub profile fetch failed: {resp.status_code}')
              soup = BeautifulSoup(resp.text, 'html.parser')
              return [el.text.strip() for el in soup.select('span.repo')]

          def get_repo_details(repo_names):
              results = []
              for repo in repo_names:
                  resp = requests.get(f'{API_URL}/repos/{USERNAME}/{repo}', headers=HEADERS, timeout=15)
                  if resp.status_code != 200:
                      continue
                  data = resp.json()
                  results.append({
                      'name': data.get('name'),
                      'description': data.get('description'),
                      'url': data.get('html_url'),
                      'primaryLanguage': {'name': data.get('language') or 'Unknown'},
                      'stargazerCount': data.get('stargazers_count', 0)
                  })
              return results

          repos = []
          try:
              names = get_pinned_repo_names()
              if names:
                  repos = get_repo_details(names)
                  print(f'Got {len(repos)} pinned repos via scraping')
          except Exception as e:
              print(f'Scraping failed: {e}')

          # Fallback: recent repos via REST API
          if not repos:
              resp = requests.get(
                  f'{API_URL}/users/{USERNAME}/repos?sort=pushed&per_page=10&type=owner',
                  headers=HEADERS, timeout=15
              )
              for r in resp.json()[:6]:
                  if not r.get('fork'):
                      repos.append({
                          'name': r['name'],
                          'description': r.get('description'),
                          'url': r['html_url'],
                          'primaryLanguage': {'name': r.get('language') or 'Unknown'},
                          'stargazerCount': r.get('stargazers_count', 0)
                      })
              print(f'Got {len(repos)} repos via REST API fallback')

          with open('public/projects.json', 'w') as f:
              json.dump(repos, f, indent=2, ensure_ascii=False)
          print(f'Wrote {len(repos)} repos to projects.json')
          "

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if ! git diff --quiet public/projects.json; then
            git add public/projects.json
            git commit -m "chore: update projects from GitHub pinned repos"
            git push
            echo "Pushed updated projects.json"
          else
            echo "No changes to projects.json"
          fi
